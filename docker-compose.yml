services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: mugang
      POSTGRES_USER: mugang
      POSTGRES_PASSWORD: mugang
    ports:
      - "5432:5432"
    volumes:
      - mugang_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mugang -d mugang"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://mugang:mugang@db:5432/mugang
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "8888:80"

volumes:
  mugang_pgdata:
