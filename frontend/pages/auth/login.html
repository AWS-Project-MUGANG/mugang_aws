<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>무강대학교 학사행정 로그인</title>
    <!-- 공통 스타일 사용 -->
    <link rel="stylesheet" href="../../css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--sidebar-bg);
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-box h1 {
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        .login-box p {
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-login:hover {
            background-color: #121858;
        }
    </style>
</head>

<body>
    <div class="login-box">
        <h1>무강대학교</h1>
        <p>통합 학사행정 서비스 로그인</p>
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="input-group">
                <label for="studentId">학번/사번</label>
                <input type="text" id="studentId" placeholder="학번을 입력하세요" required>
            </div>
            <div class="input-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" placeholder="비밀번호를 입력하세요" required>
            </div>
            <button type="submit" class="btn-login">로그인</button>
        </form>
    </div>

    <script>
        // 백엔드 통신 로그인 로직
        async function handleLogin(e) {
            e.preventDefault();
            const sid = document.getElementById('studentId').value;
            const pwd = document.getElementById('password').value;

            if (sid && pwd) {
                try {
                    const response = await fetch('http://localhost:8000/api/v1/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ student_id: sid, password: pwd })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        // 로컬 스토리지에 사용자 정보 저장
                        localStorage.setItem('user_id', data.user_id);
                        localStorage.setItem('access_token', data.access_token);
                        localStorage.setItem('role', data.role);

                        alert(data.role === 'admin' ? '강사(관리자) 권한으로 로그인 되었습니다.' : '학생 권한으로 로그인 되었습니다.');
                        window.location.href = data.role === 'admin' ? '../admin/dashboard.html' : '../student/dashboard.html';
                    } else {
                        const errorData = await response.json();
                        alert(`로그인 실패: ${errorData.detail}`);
                    }
                } catch (error) {
                    console.error('Login error:', error);
                    alert('서버 연결에 실패했습니다. 백엔드가 켜져있는지 확인해주세요.');
                }
            }
        }
    </script>
</body>

</html>
