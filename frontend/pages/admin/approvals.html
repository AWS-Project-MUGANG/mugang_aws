<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 서류 결재함</title>
    <link rel="stylesheet" href="../../css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        .approval-card {
            background: white;
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .doc-title {
            font-weight: bold;
            color: var(--primary-color);
            font-size: 1.1rem;
        }

        .doc-meta {
            font-size: 0.9rem;
            color: #666;
            margin-top: 5px;
        }

        .btn-group button {
            margin-left: 5px;
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            color: white;
        }

        .btn-approve {
            background-color: #2e7d32;
        }

        .btn-reject {
            background-color: #d32f2f;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <!-- 사이드바 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="student-info">
                    <span class="name"></span>
                    <span class="id"></span>
                </div>
                <div class="department-info">
                    <p></p>
                    <p class="sub-dept"></p>
                </div>
            </div>
            <nav class="sidebar-nav">
                <button class="nav-item" onclick="location.href='dashboard.html'">대시보드 홈</button>
                <button class="nav-item" onclick="location.href='dashboard.html'">수업 개설 관리</button>
                <button class="nav-item" onclick="location.href='enrollment_schedule.html'">수강신청 기간 설정</button>
                <button class="nav-item active">결재 / 서류 반려함</button>
                <button class="nav-item" onclick="location.href='rag_update.html'">학사 규정 AI 업데이트</button>
                <button class="nav-item logout-btn" onclick="logout()">로그아웃</button>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="logo-area">
                    <h2>결재 / 서류 반려함</h2>
                </div>
            </header>
            <div class="content-area" id="approval-list">
                <!-- Data will be dynamically loaded here via script -->
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await loadForms();
        });

        async function loadForms() {
            try {
                const response = await fetch('/api/v1/forms');
                if (!response.ok) return;
                const data = await response.json();

                const container = document.getElementById('approval-list');
                container.innerHTML = '';

                if (data.forms.length === 0) {
                    container.innerHTML = '<p>현재 대기 중인 결재 서류가 없습니다.</p>';
                    return;
                }

                data.forms.forEach(form => {
                    const dateObj = new Date(form.created_at);
                    const formattedDate = `${dateObj.getFullYear()}.${String(dateObj.getMonth() + 1).padStart(2, '0')}.${String(dateObj.getDate()).padStart(2, '0')}`;

                    let buttons = '';
                    if (form.status === 'pending') {
                        buttons = `
                            <button class="btn-approve" onclick="updateForm('${form.id}', 'approved')">승인</button>
                            <button class="btn-reject" onclick="updateForm('${form.id}', 'rejected')">반려</button>
                        `;
                    } else if (form.status === 'approved') {
                        buttons = '<span style="color: green; font-weight: bold;">승인 완료</span>';
                    } else {
                        buttons = '<span style="color: red; font-weight: bold;">반려됨</span>';
                    }

                    const card = document.createElement('div');
                    card.className = 'approval-card';
                    card.innerHTML = `
                        <div>
                            <div class="doc-title">${form.form_type}</div>
                            <div class="doc-meta">신청자: ${form.name} (${form.student_id}) | 신청일: ${formattedDate}</div>
                        </div>
                        <div class="btn-group">
                            ${buttons}
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (err) {
                console.error('문서 로딩 에러:', err);
            }
        }

        async function updateForm(formId, status) {
            try {
                const res = await fetch(`/api/v1/forms/${formId}/status`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: status })
                });
                if (res.ok) {
                    alert('서류 결재 처리가 정상적으로 완료되었습니다.');
                    loadForms();
                }
            } catch (err) {
                console.error(err);
            }
        }

        function logout() {
            localStorage.clear();
            location.href = '../auth/login.html';
        }
    </script>
</body>

</html>
